<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Tele Agent</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg:#080c14; --bg2:#0d1320; --bg3:#111827; --bg4:#1a2235;
  --border:#1e2d45; --accent:#3b82f6; --green:#10b981;
  --yellow:#f59e0b; --red:#ef4444; --purple:#8b5cf6;
  --text:#f1f5f9; --text2:#94a3b8; --text3:#475569;
  --tg:#2AABEE; --wa:#25D366;
}
body {
  font-family: -apple-system, 'Inter', sans-serif;
  background: var(--bg); color: var(--text);
  height: 100dvh; display: flex; flex-direction: column;
  overflow: hidden; -webkit-font-smoothing: antialiased;
}

/* LOGIN */
.login-screen {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  z-index: 999; padding: 24px;
}
.login-box {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 16px; padding: 28px 24px;
  width: 100%; max-width: 360px; text-align: center;
}
.login-logo { font-size: 40px; margin-bottom: 10px; }
.login-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.login-sub { font-size: 13px; color: var(--text2); margin-bottom: 24px; }
.login-input {
  width: 100%; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 14px; color: var(--text);
  font-size: 16px; font-family: inherit; outline: none; margin-bottom: 10px;
  -webkit-appearance: none;
}
.login-btn {
  width: 100%; background: var(--accent); border: none; color: #fff;
  padding: 13px; border-radius: 10px; font-size: 15px; font-weight: 600;
  cursor: pointer; font-family: inherit;
}
.login-err { color: var(--red); font-size: 12px; margin-top: 8px; }

/* APP */
#app { display: none; flex-direction: column; height: 100dvh; }

/* TOPBAR */
.topbar {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 10px 14px; display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}
.topbar-logo {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  border-radius: 8px; display: flex; align-items: center;
  justify-content: center; font-size: 16px; flex-shrink: 0;
}
.topbar-title { font-size: 15px; font-weight: 700; flex: 1; }
.topbar-sub { font-size: 11px; color: var(--text2); }
.status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--green); box-shadow: 0 0 6px var(--green);
}

/* VIEWS */
.view { display: none; flex: 1; flex-direction: column; overflow: hidden; }
.view.active { display: flex; }

/* CONV LIST */
.search-bar { padding: 10px 12px; border-bottom: 1px solid var(--border); }
.search-input {
  width: 100%; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 10px; padding: 9px 13px; color: var(--text);
  font-size: 14px; font-family: inherit; outline: none;
  -webkit-appearance: none;
}
.acc-tabs {
  display: flex; overflow-x: auto; border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.acc-tabs::-webkit-scrollbar { display: none; }
.acc-tab {
  padding: 9px 16px; font-size: 12px; font-weight: 500;
  color: var(--text2); border-bottom: 2px solid transparent;
  white-space: nowrap; cursor: pointer; background: none;
  border-top: none; border-left: none; border-right: none;
  font-family: inherit; flex-shrink: 0;
}
.acc-tab.active { color: var(--text); border-bottom-color: var(--accent); }
.conv-list { flex: 1; overflow-y: auto; }
.conv-item {
  display: flex; align-items: center; gap: 11px;
  padding: 13px 14px; border-bottom: 1px solid rgba(255,255,255,.04);
  cursor: pointer; position: relative;
}
.conv-item.flagged { border-left: 3px solid var(--red); }
.conv-item:active { background: var(--bg3); }
.avatar {
  width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 700;
}
.conv-info { flex: 1; min-width: 0; }
.conv-name {
  font-size: 14px; font-weight: 600; margin-bottom: 3px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.conv-last {
  font-size: 12px; color: var(--text2);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.conv-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
.conv-time { font-size: 11px; color: var(--text3); }
.unread-badge {
  background: var(--accent); color: #fff; font-size: 10px; font-weight: 700;
  padding: 2px 6px; border-radius: 10px; min-width: 18px; text-align: center;
}
.acc-tag {
  font-size: 9px; background: var(--bg4); color: var(--text3);
  padding: 1px 5px; border-radius: 4px; font-weight: 500;
}

/* CHAT VIEW */
.chat-header {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 10px 14px; display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}
.back-btn {
  background: none; border: none; color: var(--accent);
  font-size: 24px; cursor: pointer; padding: 0 6px 0 0; flex-shrink: 0;
  line-height: 1;
}
.chat-info { flex: 1; min-width: 0; }
.chat-name { font-size: 15px; font-weight: 600; }
.chat-sub { font-size: 11px; color: var(--text2); }
.chat-actions { display: flex; gap: 8px; }
.action-btn {
  padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 600;
  cursor: pointer; font-family: inherit; border: none;
}
.action-btn.green { background: rgba(16,185,129,.15); color: var(--green); border: 1px solid rgba(16,185,129,.3); }
.action-btn.red { background: rgba(239,68,68,.12); color: var(--red); border: 1px solid rgba(239,68,68,.25); }

.chat-messages {
  flex: 1; overflow-y: auto; padding: 14px;
  display: flex; flex-direction: column; gap: 10px;
  background: var(--bg);
}
.msg {
  max-width: 80%; padding: 9px 13px; border-radius: 14px;
  font-size: 14px; line-height: 1.5;
}
.msg.user {
  background: var(--bg3); border: 1px solid var(--border);
  align-self: flex-start; border-bottom-left-radius: 4px;
}
.msg.agent {
  background: rgba(59,130,246,.12); border: 1px solid rgba(59,130,246,.2);
  align-self: flex-end; border-bottom-right-radius: 4px;
}
.msg-label {
  font-size: 11px; color: var(--text3); margin-bottom: 4px;
}
.msg-label.right { text-align: right; }
.msg-time { font-size: 10px; color: var(--text3); margin-top: 3px; }

.chat-input-area {
  background: var(--bg2); border-top: 1px solid var(--border);
  padding: 10px 12px; flex-shrink: 0;
}
.ai-bar {
  font-size: 11px; color: var(--text2); margin-bottom: 8px;
  display: flex; align-items: center; gap: 6px;
}
.ai-tag {
  font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 20px;
  background: rgba(59,130,246,.12); color: var(--accent);
  border: 1px solid rgba(59,130,246,.2);
}
.ai-tag.human { background: rgba(245,158,11,.12); color: var(--yellow); border-color: rgba(245,158,11,.2); }
.input-row { display: flex; gap: 8px; align-items: flex-end; }
.msg-input {
  flex: 1; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 20px; padding: 10px 16px; color: var(--text);
  font-size: 15px; font-family: inherit; outline: none; resize: none;
  max-height: 100px; -webkit-appearance: none;
}
.send-btn {
  width: 42px; height: 42px; background: var(--accent); border: none;
  border-radius: 50%; color: #fff; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 18px;
}

/* BOTTOM NAV */
.bottom-nav {
  background: var(--bg2); border-top: 1px solid var(--border);
  display: flex; justify-content: space-around; padding: 6px 0;
  flex-shrink: 0; padding-bottom: max(6px, env(safe-area-inset-bottom));
}
.nav-btn {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 6px 16px; cursor: pointer; border: none; background: none;
  color: var(--text3); font-family: inherit; font-size: 10px;
  border-radius: 10px; transition: color .15s; position: relative;
}
.nav-btn.active { color: var(--accent); }
.nav-btn span { font-size: 22px; line-height: 1; }
.nav-badge {
  position: absolute; top: 2px; right: 8px;
  background: var(--red); color: #fff; font-size: 9px; font-weight: 700;
  padding: 1px 5px; border-radius: 10px; min-width: 16px; text-align: center;
}

/* EMPTY */
.empty-state {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: var(--text3); gap: 10px;
}
.empty-state .icon { font-size: 48px; }
.empty-state p { font-size: 14px; }

/* LOADING */
.loading { padding: 20px; text-align: center; color: var(--text3); font-size: 13px; }

/* Dashboard stats */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 14px; }
.stat-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px;
}
.stat-label { font-size: 11px; color: var(--text3); margin-bottom: 6px; }
.stat-val { font-size: 24px; font-weight: 800; letter-spacing: -1px; }
.stat-icon { font-size: 20px; margin-bottom: 6px; }

/* Agent status */
.agent-card {
  margin: 12px; background: var(--bg2); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px;
}
.agent-row {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 13px; margin-bottom: 8px;
}
.agent-row:last-child { margin-bottom: 0; }
.dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 5px; }
.dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); }
.dot.gray { background: var(--text3); }
.toggle {
  width: 34px; height: 20px; background: var(--green); border-radius: 10px;
  position: relative; cursor: pointer; transition: background .2s;
}
.toggle::after {
  content: ''; position: absolute; width: 16px; height: 16px;
  background: #fff; border-radius: 50%; top: 2px; left: 2px; transition: left .2s;
}
.toggle.off { background: var(--bg4); }
.toggle.off::after { left: 16px; }

/* Label badge */
.label-badge {
  display: inline-block; padding: 1px 6px; border-radius: 10px;
  font-size: 9px; font-weight: 700; margin-left: 4px;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="login-screen">
  <div class="login-box">
    <div class="login-logo">⚡</div>
    <div class="login-title">Tele Agent</div>
    <div class="login-sub">Painel Mobile</div>
    <input class="login-input" type="text" id="login-user" placeholder="Usuário (vazio = admin)" autocomplete="username">
    <input class="login-input" type="password" id="login-pass" placeholder="Senha" autocomplete="current-password">
    <button class="login-btn" onclick="doLogin()">Entrar</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-logo">⚡</div>
    <div style="flex:1">
      <div class="topbar-title">Tele Agent</div>
      <div class="topbar-sub" id="topbar-user">Carregando...</div>
    </div>
    <div class="status-dot" id="agent-dot"></div>
  </div>

  <!-- VIEWS -->

  <!-- DASHBOARD -->
  <div class="view active" id="view-dashboard">
    <div style="flex:1;overflow-y:auto">
      <div class="agent-card">
        <div class="agent-row">
          <span><span class="dot green"></span>Agente IA</span>
          <div class="toggle" id="agent-toggle" onclick="toggleAgent()"></div>
        </div>
        <div class="agent-row">
          <span><span class="dot" id="tg-dot" style="background:var(--text3)"></span>Telegram</span>
          <span id="tg-status" style="font-size:12px;color:var(--text3)">Aguardando</span>
        </div>
        <div class="agent-row">
          <span><span class="dot green"></span>WhatsApp</span>
          <span style="font-size:12px;color:var(--green)">Online</span>
        </div>
      </div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon">💬</div>
          <div class="stat-label">Conversas hoje</div>
          <div class="stat-val" id="s-conv" style="color:var(--accent)">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">📨</div>
          <div class="stat-label">Mensagens</div>
          <div class="stat-val" id="s-msgs" style="color:var(--green)">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">👤</div>
          <div class="stat-label">Modo humano</div>
          <div class="stat-val" id="s-human" style="color:var(--yellow)">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">🤖</div>
          <div class="stat-label">Respondidas IA</div>
          <div class="stat-val" id="s-ai" style="color:var(--purple)">—</div>
        </div>
      </div>
      <div style="padding:0 14px 14px">
        <button onclick="refreshData()" style="width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--text2);padding:11px;border-radius:10px;font-size:13px;cursor:pointer;font-family:inherit">🔄 Atualizar dados</button>
      </div>
    </div>
  </div>

  <!-- CONVERSAS LISTA -->
  <div class="view" id="view-convs">
    <div class="search-bar">
      <input class="search-input" id="m-search" placeholder="🔍 Buscar..." oninput="filterConvs()">
    </div>
    <div class="acc-tabs" id="m-acc-tabs"></div>
    <div class="conv-list" id="m-conv-list">
      <div class="loading">Carregando...</div>
    </div>
  </div>

  <!-- CHAT -->
  <div class="view" id="view-chat">
    <div class="chat-header">
      <button class="back-btn" onclick="goBack()">‹</button>
      <div class="chat-info">
        <div class="chat-name" id="m-chat-name">—</div>
        <div class="chat-sub" id="m-chat-sub">—</div>
      </div>
      <div class="chat-actions">
        <button class="action-btn green" id="m-btn-assume" onclick="toggleHuman()">👤 Assumir</button>
      </div>
    </div>
    <div class="chat-messages" id="m-chat-msgs"></div>
    <div class="chat-input-area">
      <div class="ai-bar">
        <span class="ai-tag" id="m-mode-tag">🤖 IA respondendo</span>
        <span id="m-mode-text">— automático</span>
      </div>
      <div class="input-row">
        <textarea class="msg-input" id="m-msg-input" placeholder="Mensagem manual..." rows="1"
          oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
        <button class="send-btn" onclick="sendMsg()">➤</button>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <button class="nav-btn active" id="nav-dash" onclick="showView('dashboard')">
      <span>📊</span>Dashboard
    </button>
    <button class="nav-btn" id="nav-convs" onclick="showView('convs')">
      <span>💬</span>Conversas
      <div class="nav-badge" id="m-unread-badge" style="display:none">0</div>
    </button>
    <button class="nav-btn" id="nav-back" onclick="window.location.href='/?desktop=1'" style="display:none">
      <span>🖥️</span>Desktop
    </button>
    <button class="nav-btn" id="nav-logout" onclick="doLogout()">
      <span>🚪</span>Sair
    </button>
  </div>

</div>

<script>
const BASE = window.location.origin;
let TOKEN = localStorage.getItem('zk00_token') || '';
let currentConv = null;
let allConvs = [];
let activeFilter = 'all';
let agentActive = true;
let isHumanMode = false;
let refreshTimer = null;

// ── API ──
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json', 'x-admin-token': TOKEN } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(BASE + path, opts);
  return r.json();
}

function timeAgo(ts) {
  if (!ts) return '';
  const diff = (Date.now() - new Date(ts)) / 1000;
  if (diff < 60) return 'agora';
  if (diff < 3600) return Math.floor(diff/60) + 'min';
  if (diff < 86400) return Math.floor(diff/3600) + 'h';
  return Math.floor(diff/86400) + 'd';
}

// ── LOGIN ──
async function doLogin() {
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value.trim();
  const res = await api('POST', '/api/login', { username: user, password: pass });
  if (res.token) {
    TOKEN = res.token;
    localStorage.setItem('zk00_token', TOKEN);
    localStorage.setItem('zk00_user', JSON.stringify(res.user));
    startApp();
  } else {
    document.getElementById('login-err').textContent = res.error || 'Senha incorreta';
  }
}

function doLogout() {
  localStorage.removeItem('zk00_token');
  localStorage.removeItem('zk00_user');
  location.reload();
}

// ── START ──
function startApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  const u = JSON.parse(localStorage.getItem('zk00_user') || '{}');
  document.getElementById('topbar-user').textContent = u.name || u.username || 'Admin';
  refreshData();
  refreshTimer = setInterval(refreshData, 8000);
}

// ── DATA ──
async function refreshData() {
  const [stats, convs, accounts] = await Promise.all([
    api('GET', '/api/stats'),
    api('GET', '/api/conversations'),
    api('GET', '/api/accounts')
  ]);

  // Stats
  if (!stats.error) {
    document.getElementById('s-conv').textContent = stats.todayConversations || 0;
    document.getElementById('s-msgs').textContent = stats.totalMessages || 0;
    document.getElementById('s-human').textContent = stats.humanModeCount || 0;
    document.getElementById('s-ai').textContent = stats.aiResponses || 0;
    agentActive = stats.agentActive !== false;
    updateAgentUI();

    // Telegram status
    if (accounts && !accounts.error) {
      const connected = accounts.some(a => a.connected);
      const dot = document.getElementById('tg-dot');
      const status = document.getElementById('tg-status');
      dot.style.background = connected ? 'var(--green)' : 'var(--text3)';
      if (connected) dot.style.boxShadow = '0 0 6px var(--green)';
      status.textContent = connected ? 'Online' : 'Aguardando';
      status.style.color = connected ? 'var(--green)' : 'var(--text3)';
    }
  }

  // Convs
  if (convs && !convs.error) {
    allConvs = convs;
    renderConvList();
    renderAccTabs(accounts || []);

    const total = convs.reduce((s,c) => s + (c.unread||0), 0);
    const badge = document.getElementById('m-unread-badge');
    badge.textContent = total;
    badge.style.display = total > 0 ? 'block' : 'none';
  }

  // Refresh chat if open
  if (currentConv && document.getElementById('view-chat').classList.contains('active')) {
    loadChat(currentConv, false);
  }
}

function updateAgentUI() {
  const toggle = document.getElementById('agent-toggle');
  const dot = document.getElementById('agent-dot');
  toggle.className = 'toggle' + (agentActive ? '' : ' off');
  dot.style.background = agentActive ? 'var(--green)' : 'var(--text3)';
  if (agentActive) dot.style.boxShadow = '0 0 6px var(--green)';
}

async function toggleAgent() {
  agentActive = !agentActive;
  updateAgentUI();
  await api('POST', '/api/agent/toggle', { active: agentActive });
}

// ── ACCOUNT TABS ──
function renderAccTabs(accounts) {
  const el = document.getElementById('m-acc-tabs');
  const accMap = {};
  accounts.forEach(a => accMap[a.id] = a);

  const accIds = new Set();
  allConvs.forEach(c => {
    if (c.platform?.startsWith('telegram_')) accIds.add(c.platform.replace('telegram_',''));
  });

  let html = `<button class="acc-tab ${activeFilter==='all'?'active':''}" onclick="setFilter('all')">Todas ${allConvs.length}</button>`;
  accIds.forEach(id => {
    const acc = accMap[id];
    const name = acc?.name || 'Conta';
    const count = allConvs.filter(c => c.platform === `telegram_${id}`).length;
    const unread = allConvs.filter(c => c.platform === `telegram_${id}`).reduce((s,c)=>s+(c.unread||0),0);
    html += `<button class="acc-tab ${activeFilter===id?'active':''}" onclick="setFilter('${id}')">
      ${name} ${unread > 0 ? `<span style="background:var(--red);color:#fff;font-size:9px;padding:1px 5px;border-radius:8px">${unread}</span>` : count}
    </button>`;
  });
  el.innerHTML = html;
}

function setFilter(id) {
  activeFilter = id;
  renderConvList();
  document.querySelectorAll('.acc-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
}

// ── CONV LIST ──
function filterConvs() { renderConvList(); }

function renderConvList() {
  const el = document.getElementById('m-conv-list');
  const q = document.getElementById('m-search').value.toLowerCase();
  const labels = JSON.parse(localStorage.getItem('conv_labels') || '{}');

  let filtered = allConvs;
  if (activeFilter !== 'all') {
    filtered = filtered.filter(c => c.platform === `telegram_${activeFilter}`);
  }
  if (q) filtered = filtered.filter(c => c.clientName?.toLowerCase().includes(q) || c.lastMessage?.toLowerCase().includes(q));

  if (!filtered.length) {
    el.innerHTML = '<div class="empty-state"><div class="icon">💬</div><p>Nenhuma conversa</p></div>';
    return;
  }

  el.innerHTML = filtered.map(c => {
    const label = labels[c.key];
    const avatarBg = c.platform?.includes('telegram') ? 'rgba(42,171,238,.15)' : 'rgba(37,211,102,.15)';
    const avatarColor = c.platform?.includes('telegram') ? 'var(--tg)' : 'var(--wa)';
    const accId = c.platform?.replace('telegram_','');
    const accName = (window._accs||{})[accId]?.name || 'TG';

    return `<div class="conv-item ${c.flag==='attention'?'flagged':''}" onclick="openConv(${JSON.stringify(c).replace(/"/g,'&quot;')})">
      <div class="avatar" style="background:${avatarBg};color:${avatarColor}">${c.clientName?.charAt(0)?.toUpperCase()||'?'}</div>
      <div class="conv-info">
        <div class="conv-name">
          ${c.clientName}
          <span class="acc-tag">${accName}</span>
          ${label ? `<span class="label-badge" style="background:${label.color}22;color:${label.color};border:1px solid ${label.color}44">${label.name}</span>` : ''}
          ${c.flag==='attention' ? '<span style="color:var(--red);font-size:11px">⚠️</span>' : ''}
        </div>
        <div class="conv-last">${c.lastMessage?.substring(0,45)||''}</div>
      </div>
      <div class="conv-meta">
        <span class="conv-time">${timeAgo(c.lastTime)}</span>
        ${c.unread>0 ? `<span class="unread-badge">${c.unread}</span>` : ''}
      </div>
    </div>`;
  }).join('');

  // Cache accounts
  window._accs = window._accs || {};
}

// ── CHAT ──
async function openConv(conv) {
  currentConv = conv;
  isHumanMode = conv.isHumanMode || false;

  document.getElementById('m-chat-name').textContent = conv.clientName;
  const accId = conv.platform?.replace('telegram_','');
  const accName = (window._accs||{})[accId]?.name || conv.platform;
  document.getElementById('m-chat-sub').textContent = accName;

  updateModeUI();
  showView('chat');

  // Marca como lido
  api('POST', `/api/conversations/${conv.platform}/${conv.userId}/read`);
  const item = allConvs.find(c => c.key === conv.key);
  if (item) { item.unread = 0; item.flag = null; }

  await loadChat(conv, true);
}

async function loadChat(conv, scroll) {
  const data = await api('GET', `/api/conversations/${conv.platform}/${conv.userId}`);
  const el = document.getElementById('m-chat-msgs');
  if (!data?.history?.length) {
    el.innerHTML = '<div class="empty-state"><div class="icon">💬</div><p>Sem mensagens ainda</p></div>';
    return;
  }
  el.innerHTML = data.history.map(m => `
    <div>
      <div class="msg-label ${m.role==='user'?'':'right'}">${m.role==='user'?(conv.clientName||'Lead'):'Tele Agent'} · ${timeAgo(m.timestamp)}</div>
      <div class="msg ${m.role==='user'?'user':'agent'}">${m.content?.replace(/\n/g,'<br>')||''}</div>
    </div>
  `).join('');
  if (scroll) el.scrollTop = el.scrollHeight;
}

function updateModeUI() {
  const tag = document.getElementById('m-mode-tag');
  const text = document.getElementById('m-mode-text');
  const btn = document.getElementById('m-btn-assume');
  tag.textContent = isHumanMode ? '👤 Você' : '🤖 IA respondendo';
  tag.className = 'ai-tag' + (isHumanMode ? ' human' : '');
  text.textContent = isHumanMode ? '— você está no controle' : '— automático';
  btn.textContent = isHumanMode ? '🤖 Devolver IA' : '👤 Assumir';
}

async function toggleHuman() {
  if (!currentConv) return;
  isHumanMode = !isHumanMode;
  await api('POST', '/api/human-mode', { platform: currentConv.platform, userId: currentConv.userId, active: isHumanMode });
  updateModeUI();
}

async function sendMsg() {
  if (!currentConv) return;
  const input = document.getElementById('m-msg-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  await api('POST', '/api/send', { platform: currentConv.platform, userId: currentConv.userId, message: text });
  await api('POST', `/api/conversations/${currentConv.platform}/${currentConv.userId}/read`);
  await loadChat(currentConv, true);
}

// ── NAVIGATION ──
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`view-${name}`).classList.add('active');
  const navBtn = document.getElementById(`nav-${name === 'chat' ? 'convs' : name}`);
  if (navBtn) navBtn.classList.add('active');
}

function goBack() {
  showView('convs');
  currentConv = null;
}

// ── INIT ──
if (TOKEN) {
  const savedUser = localStorage.getItem('zk00_user');
  if (savedUser) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    const u = JSON.parse(savedUser);
    document.getElementById('topbar-user').textContent = u.name || u.username || 'Admin';
  }
  startApp();
}
</script>
